<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Two Player Chess</title> 
  <link rel="stylesheet" href="style.css" />
  <script defer src="script.js"></script>
  <meta name="author" content="Aziz Rifat" />
  <meta name="description" content="A local two player chess game implemented in vanilla JavaScript. It features a responsive design, move history, and handles all standard chess rules including check, checkmate, stalemate, castling, en passant, and pawn promotion." />
  <meta name="keywords" content="chess, two player, local multiplayer, vanilla JavaScript, responsive design, move history, chess rules" />
</head>
<body>
  <main class="app">
    <section class="game-panel">
      <div class="topbar">
        <h1>Two Player Chess</h1>
        <div id="status" class="status">White to move.</div>
      </div>

      <div class="board-wrap">
        <div id="board" aria-label="Chess board"></div>
      </div>

      <div class="actions">
        <button id="newGame" class="primary">New Game</button>
        <button id="undoMove">Undo Move</button>
        <button id="flipBoard">Flip Board</button>
      </div>
    </section>

    <aside class="side-panel">
      <h2>Game Rules Included</h2>
      <div class="info-card">
        <strong>Local two player:</strong> White and Black take turns on the same device. Legal moves, check, checkmate, stalemate, castling, en passant, and pawn promotion are handled automatically.
      </div>
      <h2>Move History</h2>
      <div id="history" class="history"></div>
    </aside>
  </main>

  <div id="promotionModal" class="modal" role="dialog" aria-modal="true" aria-label="Pawn promotion">
    <div class="promotion-box">
      <h3>Promote pawn to</h3>
      <div class="promotion-choices">
        <button data-piece="q" title="Queen">♕</button>
        <button data-piece="r" title="Rook">♖</button>
        <button data-piece="b" title="Bishop">♗</button>
        <button data-piece="n" title="Knight">♘</button>
      </div>
    </div>
  </div>
</body>
</html>
